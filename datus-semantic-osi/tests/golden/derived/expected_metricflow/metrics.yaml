---
metric:
  name: revenue
  owners:
  - datus@datus.ai
  type: measure_proxy
  type_params:
    measures:
    - orders_amount_sum
---
metric:
  name: order_count
  owners:
  - datus@datus.ai
  type: measure_proxy
  type_params:
    measures:
    - orders_order_id_count_distinct
---
metric:
  name: avg_order_value
  owners:
  - datus@datus.ai
  description: revenue per order via derived
  type: derived
  type_params:
    expr: revenue * 1.0 / NULLIF(order_count, 0)
    metrics:
    - name: revenue
    - name: order_count
