version: 0.2.0.dev0
semantic_model:
- name: derived_avg
  datasets:
  - name: orders
    source: orders
    primary_key:
    - order_id
    fields:
    - name: order_date
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: order_date
      dimension:
        is_time: true
      custom_extensions:
      - vendor_name: DATUS
        data: '{"time_granularity": "day", "type": "time"}'
    custom_extensions:
    - vendor_name: DATUS
      data: '{"time_dimension": {"granularity": "day", "name": "order_date"}}'
  metrics:
  - name: revenue
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: SUM(amount)
    custom_extensions:
    - vendor_name: DATUS
      data: '{"dataset": "orders"}'
  - name: order_count
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: COUNT(DISTINCT order_id)
    custom_extensions:
    - vendor_name: DATUS
      data: '{"dataset": "orders"}'
  - name: avg_order_value
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: revenue * 1.0 / NULLIF(order_count, 0)
    description: revenue per order via derived
    custom_extensions:
    - vendor_name: DATUS
      data: '{"inputs": ["revenue", "order_count"], "metric_kind": "derived"}'
