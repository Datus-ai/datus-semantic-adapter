---
data_source:
  name: paid_orders
  description: paid_orders
  owners:
  - datus@datus.ai
  sql_query: SELECT * FROM orders WHERE (status = 'paid')
  identifiers:
  - name: order_id
    type: primary
    expr: order_id
  dimensions:
  - name: order_date
    type: time
    type_params:
      is_primary: true
      time_granularity: day
  measures:
  - name: paid_orders_order_id_count_distinct
    agg: count_distinct
    expr: order_id
    create_metric: false
