version: 0.2.0.dev0
semantic_model:
- name: paid_orders
  datasets:
  - name: paid_orders
    source: orders
    primary_key:
    - order_id
    fields:
    - name: order_date
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: order_date
      dimension:
        is_time: true
      custom_extensions:
      - vendor_name: DATUS
        data: '{"time_granularity": "day", "type": "time"}'
    custom_extensions:
    - vendor_name: DATUS
      data: '{"filters": [{"expression": "status = ''paid''", "scope": "dataset"}],
        "time_dimension": {"granularity": "day", "name": "order_date"}}'
  metrics:
  - name: paid_order_count
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: COUNT(DISTINCT order_id)
    description: count of paid orders
    custom_extensions:
    - vendor_name: DATUS
      data: '{"dataset": "paid_orders", "time_dimension": "order_date"}'
