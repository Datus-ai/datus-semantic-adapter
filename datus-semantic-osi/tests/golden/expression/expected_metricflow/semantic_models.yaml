---
data_source:
  name: orders
  description: orders
  owners:
  - datus@datus.ai
  sql_query: SELECT * FROM orders
  identifiers:
  - name: order_id
    type: primary
    expr: order_id
  dimensions:
  - name: order_date
    type: time
    type_params:
      is_primary: true
      time_granularity: day
  measures:
  - name: orders_revenue_sum
    agg: sum
    expr: revenue
    create_metric: false
  - name: orders_cost_sum
    agg: sum
    expr: cost
    create_metric: false
