version: 0.2.0.dev0
semantic_model:
- name: net_revenue
  datasets:
  - name: orders
    source: orders
    primary_key:
    - order_id
    fields:
    - name: order_date
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: order_date
      dimension:
        is_time: true
      custom_extensions:
      - vendor_name: DATUS
        data: '{"time_granularity": "day", "type": "time"}'
    custom_extensions:
    - vendor_name: DATUS
      data: '{"time_dimension": {"granularity": "day", "name": "order_date"}}'
  metrics:
  - name: net_revenue
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: SUM(revenue) - SUM(cost)
    description: revenue minus cost
    custom_extensions:
    - vendor_name: DATUS
      data: '{"dataset": "orders"}'
